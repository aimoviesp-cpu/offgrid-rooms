{ id:“beauty”, label:“Beauty”, color:”#3a1a2a”, border:”#7a2a4a”, items:[

“Eye bags reduction — Event / Face moisturizer — Daily / Ear hygiene — Every other Day / Hair style — Daily / Cologne — Daily”,
“Style: Plan in advance your clothes for the week. Every week plan your clothes.”,
]},
];

const WORKOUT_TYPES = [“Push”,“Pull”,“Lower”,“Calisthenics”,“Rest”];
const BMR = 1969;
const BASE_DAILY_BURN = Math.round(BMR * 1.2);
const WORKOUT_BURNS = {Push:408,Pull:408,Lower:476,Calisthenics:544,Rest:0};
const KCAL_PER_STEP = 0.045;
const calcTotalBurn = (wt, steps) => BASE_DAILY_BURN + (WORKOUT_BURNS[wt]||0) + Math.round((Number(steps)||0)*KCAL_PER_STEP);

const todayStr = () => new Date().toISOString().slice(0,10);
const loadData = () => { try { return JSON.parse(localStorage.getItem(“lifeOS_days”)||”{}”); } catch { return {}; } };
const saveData = (d) => { try { localStorage.setItem(“lifeOS_days”, JSON.stringify(d)); } catch {} };

const domainPct = (checks, habits) => {
if (!checks) return 0;
const total = habits.reduce((a,h)=>a+h.w,0);
const earned = habits.reduce((a,h,i)=>a+(checks[i]?h.w:0),0);
return Math.round((earned/total)*100);
};
const dailyPct = (dayData) => {
if (!dayData) return 0;
const sum = DOMAINS.reduce((a,d)=>a+domainPct(dayData.checks?.[d.id],d.habits),0);
return Math.round(sum/DOMAINS.length);
};
const pctColor = (p) => p>=75?”#34d399”:p>=40?”#60a5fa”:p>0?”#f59e0b”:”#333”;

function BarLineChart({data}) {
const ref = useRef(null); const chart = useRef(null);
useEffect(()=>{
if (!ref.current) return;
if (chart.current) chart.current.destroy();
chart.current = new Chart(ref.current,{
data:{
labels:data.map(d=>d.date.slice(5)),
datasets:[
{type:“bar”,label:“Eaten”,data:data.map(d=>d.calIn||0),backgroundColor:”#4a9eff88”,borderColor:”#4a9eff”,borderWidth:1},
{type:“bar”,label:“Burned”,data:data.map(d=>d.calBurn||0),backgroundColor:”#34d39988”,borderColor:”#34d399”,borderWidth:1},
{type:“line”,label:“Deficit”,data:data.map(d=>Math.max(0,(d.calBurn||0)-(d.calIn||0))),borderColor:”#f59e0b”,backgroundColor:”#f59e0b22”,tension:0.3,fill:false,pointRadius:3,pointBackgroundColor:”#f59e0b”},
]
},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:”#555”,font:{size:10}},grid:{color:”#111”}},y:{ticks:{color:”#555”,font:{size:10}},grid:{color:”#111”}}}}
});
return ()=>{ if(chart.current) chart.current.destroy(); };
},[data]);
return <canvas ref={ref} style={{width:“100%”,height:“100%”}}/>;
}

function WeightChart({data}) {
const ref = useRef(null); const chart = useRef(null);
useEffect(()=>{
if (!ref.current) return;
if (chart.current) chart.current.destroy();
const filtered = data.filter(d=>d.weight);
if (!filtered.length) return;
chart.current = new Chart(ref.current,{
type:“line”,
data:{labels:filtered.map(d=>d.date.slice(5)),datasets:[{label:“Weight”,data:filtered.map(d=>d.weight),borderColor:”#a78bfa”,backgroundColor:”#a78bfa22”,tension:0.3,pointRadius:4,pointBackgroundColor:”#a78bfa”,fill:true}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:”#555”,font:{size:10}},grid:{color:”#111”}},y:{ticks:{color:”#555”,font:{size:10}},grid:{color:”#111”}}}}
});
return ()=>{ if(chart.current) chart.current.destroy(); };
},[data]);
return <canvas ref={ref} style={{width:“100%”,height:“100%”}}/>;
}

function App() {
const [tab, setTab] = useState(“daily”);
const [days, setDays] = useState(loadData);
const [today] = useState(todayStr());
const [expanded, setExpanded] = useState({});
const [calIn, setCalIn] = useState(””);
const [steps, setSteps] = useState(””);
const [weight, setWeight] = useState(””);
const [workoutType, setWorkoutType] = useState(””);
const [workoutNotes, setWorkoutNotes] = useState(””);
const [deficitRange, setDeficitRange] = useState(“weekly”);
const [monthOffset, setMonthOffset] = useState(0);
const [activeDomain, setActiveDomain] = useState(null);

const updateDays = (nd) => { setDays(nd); saveData(nd); };

const toggleHabit = (domainId, idx) => {
const d = days[today]||{checks:{}};
const checks = {…d.checks};
const domain = DOMAINS.find(x=>x.id===domainId);
const arr = […(checks[domainId]||domain.habits.map(()=>false))];
arr[idx] = !arr[idx];
checks[domainId] = arr;
updateDays({…days,[today]:{…d,checks}});
};

const saveDaily = () => {
const d = days[today]||{checks:{}};
const stepsNum = Number(steps)||0;
updateDays({…days,[today]:{…d,calIn:Number(calIn)||0,calBurn:calcTotalBurn(workoutType,stepsNum),stepsNum,weight:Number(weight)||0,workoutType,workoutNotes}});
alert(“Saved!”);
};

const getLast7 = () => Array.from({length:7},(*,i)=>{ const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10); });
const getLast30 = () => Array.from({length:30},(*,i)=>{ const d=new Date(); d.setDate(d.getDate()-(29-i)); return d.toISOString().slice(0,10); });
const getMonthDays = (offset=0) => {
const now=new Date(); now.setDate(1); now.setMonth(now.getMonth()+offset);
const y=now.getFullYear(),m=now.getMonth();
return Array.from({length:new Date(y,m+1,0).getDate()},(_,i)=>`${y}-${String(m+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`);
};
const getMonthLabel = (offset=0) => {
const now=new Date(); now.setDate(1); now.setMonth(now.getMonth()+offset);
return now.toLocaleString(“default”,{month:“long”,year:“numeric”});
};
const getStreak = () => {
let streak=0; const d=new Date();
while(true){ const k=d.toISOString().slice(0,10); if(dailyPct(days[k])>0){streak++;d.setDate(d.getDate()-1);}else break; }
return streak;
};

const exportData = () => {
const blob=new Blob([JSON.stringify(days,null,2)],{type:“application/json”});
const url=URL.createObjectURL(blob); const a=document.createElement(“a”); a.href=url; a.download=`lifeOS_backup_${today}.json`; a.click(); URL.revokeObjectURL(url);
};
const importData = (e) => {
const file=e.target.files[0]; if(!file) return;
const reader=new FileReader();
reader.onload=(ev)=>{ try{ const p=JSON.parse(ev.target.result); if(typeof p===“object”&&p!==null){updateDays(p);alert(“Imported!”);} else alert(“Invalid file.”); } catch{ alert(“Could not read file.”); } };
reader.readAsText(file); e.target.value=””;
};

const s = {bg:”#000”,card:”#0a0a0a”,border:”#1a1a1a”,text:”#e8e8e8”,muted:”#555”,accent:”#4a9eff”,dim:”#111”};
const C = (ex={}) => ({background:s.card,border:`1px solid ${s.border}`,borderRadius:10,…ex});

const todayData = days[today]||{checks:{}};
const todayPct = dailyPct(todayData);
const streak = getStreak();
const last7 = getLast7();
const last30 = getLast30();

const deficitDays = deficitRange===“weekly”?last7:getMonthDays();
const rangeCalIn   = deficitDays.reduce((a,dt)=>a+(days[dt]?.calIn||0),0);
const rangeCalBurn = deficitDays.reduce((a,dt)=>a+(days[dt]?.calBurn||0),0);
const rangeDeficit = rangeCalBurn-rangeCalIn;
const rangeSteps   = deficitDays.reduce((a,dt)=>a+(days[dt]?.stepsNum||0),0);
const chartData    = deficitDays.map(dt=>({date:dt,calIn:days[dt]?.calIn||0,calBurn:days[dt]?.calBurn||0}));

const weekGymDays = last7.filter(dt=>days[dt]?.workoutType&&days[dt].workoutType!==“Rest”);
const weekWorkoutSummary = last7.map(dt=>({date:dt,type:days[dt]?.workoutType||””,notes:days[dt]?.workoutNotes||””,steps:days[dt]?.stepsNum||0})).filter(d=>d.type);
const latestWeight = […last30].reverse().find(dt=>days[dt]?.weight);
const weightChartData = last30.map(dt=>({date:dt,weight:days[dt]?.weight||0}));

const previewBurn = calcTotalBurn(workoutType,steps);
const previewDeficit = previewBurn-(Number(calIn)||0);
const domainAvg7 = (d) => Math.round(last7.reduce((a,dt)=>a+domainPct(days[dt]?.checks?.[d.id],d.habits),0)/7);

const tabs = [
{id:“daily”,label:“Daily”},{id:“dashboard”,label:“Dashboard”},
{id:“monthly”,label:“Monthly”},{id:“weekly”,label:“Weekly”},
{id:“body”,label:“Body”},{id:“domains”,label:“Domains”},
{id:“system”,label:“System”},{id:“settings”,label:“Settings”}
];

return (
<div style={{background:s.bg,minHeight:“100vh”,color:s.text,paddingBottom:80}}>

```
  {/* TOP HEADER */}
  <div style={{background:s.card,borderBottom:`1px solid ${s.border}`,padding:"14px 16px",position:"sticky",top:0,zIndex:10,textAlign:"center"}}>
    <div style={{fontSize:18,fontWeight:600,letterSpacing:1,color:s.text}}>SYSTEM</div>
  </div>

  {/* NAV */}
  <div style={{display:"flex",background:s.card,borderBottom:`1px solid ${s.border}`,overflowX:"auto"}}>
    {tabs.map(t=>(
      <button key={t.id} onClick={()=>{ setTab(t.id); setActiveDomain(null); }}
        style={{flex:1,minWidth:44,padding:"10px 1px",border:"none",background:"none",
          color:tab===t.id?s.accent:s.muted,fontSize:10,fontWeight:tab===t.id?600:400,
          borderBottom:tab===t.id?`2px solid ${s.accent}`:"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap"}}>
        {t.label}
      </button>
    ))}
  </div>

  {/* CONTENT */}
  <div style={{padding:16}}>

    {/* ── DAILY ── */}
    {tab==="daily" && (
      <div>
        {DOMAINS.map(domain=>{
          const checks = todayData.checks?.[domain.id]||domain.habits.map(()=>false);
          const pct = domainPct(checks,domain.habits);
          const isOpen = expanded[domain.id]!==false;
          const totalW = domain.habits.reduce((a,h)=>a+h.w,0);
          return (
            <div key={domain.id} style={{...C(),marginBottom:10,overflow:"hidden"}}>
              <div onClick={()=>setExpanded(e=>({...e,[domain.id]:!isOpen}))} style={{display:"flex",alignItems:"center",padding:"12px 14px",cursor:"pointer"}}>
                <span style={{flex:1,fontWeight:500,fontSize:15}}>{domain.label}</span>
                <span style={{fontSize:13,fontWeight:600,color:pctColor(pct),marginRight:10}}>{pct}%</span>
                <span style={{color:s.muted,fontSize:11}}>{isOpen?"▲":"▼"}</span>
              </div>
              <div style={{height:2,background:s.border}}>
                <div style={{height:"100%",width:`${pct}%`,background:pctColor(pct),transition:"width 0.3s"}}/>
              </div>
              {isOpen && (
                <div style={{borderTop:`1px solid ${s.border}`,padding:"8px 14px"}}>
                  {domain.habits.map((h,i)=>{
                    const habPct = Math.round((h.w/totalW)*100);
                    return (
                      <div key={i} onClick={()=>toggleHabit(domain.id,i)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer",borderBottom:i<domain.habits.length-1?`1px solid ${s.dim}`:"none"}}>
                        <div style={{width:18,height:18,border:`1.5px solid ${checks[i]?s.accent:s.muted}`,borderRadius:4,background:checks[i]?s.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {checks[i]&&<span style={{color:"#000",fontSize:11,fontWeight:700}}>✓</span>}
                        </div>
                        <span style={{flex:1,fontSize:14,color:checks[i]?s.muted:s.text,textDecoration:checks[i]?"line-through":"none"}}>{h.label}</span>
                        <span style={{fontSize:11,color:checks[i]?s.accent:s.muted,minWidth:32,textAlign:"right"}}>{habPct}%</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}

        <div style={{...C(),padding:14,marginBottom:10}}>
          <div style={{fontSize:14,fontWeight:500,marginBottom:14}}>Nutrition & Body</div>
          {[["Calories eaten",calIn,setCalIn,"e.g. 2000"],["Steps walked",steps,setSteps,"e.g. 8500"],["Weight (lbs)",weight,setWeight,"e.g. 200"]].map(([label,val,setter,ph])=>(
            <div key={label} style={{marginBottom:12}}>
              <div style={{fontSize:11,color:s.muted,marginBottom:4}}>{label}</div>
              <input value={val} onChange={e=>setter(e.target.value)} type="number" placeholder={ph}
                style={{width:"100%",background:s.bg,border:`1px solid ${s.border}`,borderRadius:6,padding:"8px 10px",color:s.text,fontSize:14}}/>
            </div>
          ))}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:s.muted,marginBottom:6}}>Workout type</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {WORKOUT_TYPES.map(t=>(
                <button key={t} onClick={()=>setWorkoutType(workoutType===t?"":t)}
                  style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${workoutType===t?s.accent:s.border}`,
                    background:workoutType===t?"#4a9eff22":"transparent",color:workoutType===t?s.accent:s.muted,fontSize:12,cursor:"pointer"}}>
                  {t}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:s.muted,marginBottom:4}}>Workout notes / PRs</div>
            <textarea value={workoutNotes} onChange={e=>setWorkoutNotes(e.target.value)} rows={2} placeholder="e.g. Bench 3x8 @ 185lbs..."
              style={{width:"100%",background:s.bg,border:`1px solid ${s.border}`,borderRadius:6,padding:"8px 10px",color:s.text,fontSize:13,resize:"vertical"}}/>
          </div>
          {(calIn||steps||workoutType)&&(
            <div style={{background:s.dim,borderRadius:8,padding:"10px 12px",marginBottom:14,borderLeft:`3px solid ${previewDeficit>0?"#34d399":"#f87171"}`}}>
              <div style={{fontSize:11,color:s.muted,marginBottom:6}}>Estimated burn today</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                {[["Base",BASE_DAILY_BURN,"#555"],["Workout",WORKOUT_BURNS[workoutType]||0,"#60a5fa"],["Steps",Math.round((Number(steps)||0)*KCAL_PER_STEP),"#34d399"]].map(([l,v,c])=>(
                  <div key={l}><div style={{fontSize:10,color:s.muted}}>{l}</div><div style={{fontSize:13,fontWeight:600,color:c}}>{v} kcal</div></div>
                ))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${s.border}`}}>
                <span style={{fontSize:12,color:s.muted}}>Total: <span style={{color:s.text,fontWeight:600}}>{previewBurn.toLocaleString()} kcal</span></span>
                <span style={{fontSize:12,fontWeight:600,color:previewDeficit>0?"#34d399":"#f87171"}}>{previewDeficit>0?"✓ −":"↑ +"}{Math.abs(previewDeficit).toLocaleString()} kcal</span>
              </div>
            </div>
          )}
          <button onClick={saveDaily} style={{background:s.accent,color:"#000",border:"none",borderRadius:6,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Save Day</button>
        </div>
      </div>
    )}

    {/* ── DASHBOARD ── */}
    {tab==="dashboard" && (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          {[["⚡ Streak",`${streak}d`],["Today",`${todayPct}%`],["7d Avg",`${Math.round(last7.reduce((a,d)=>a+dailyPct(days[d]),0)/7)}%`]].map(([l,v])=>(
            <div key={l} style={{...C({borderRadius:8}),padding:"10px 12px"}}>
              <div style={{fontSize:10,color:s.muted,marginBottom:4}}>{l}</div>
              <div style={{fontSize:20,fontWeight:600}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{...C(),marginBottom:14,overflow:"hidden"}}>
          <div style={{padding:"10px 14px",fontSize:13,fontWeight:500,borderBottom:`1px solid ${s.border}`}}>Last 7 Days</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:380}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${s.border}`}}>
                  <th style={{padding:"8px 10px",textAlign:"left",color:s.muted,fontWeight:500}}>Date</th>
                  {DOMAINS.map(d=><th key={d.id} style={{padding:"8px 5px",color:s.muted,fontWeight:500,fontSize:10,whiteSpace:"nowrap"}}>{d.label.slice(0,3)}</th>)}
                  <th style={{padding:"8px 8px",color:s.muted,fontWeight:500}}>Day</th>
                </tr>
              </thead>
              <tbody>
                {last7.map(dt=>{
                  const dd=days[dt]||{}; const dp=dailyPct(dd); const isToday=dt===today;
                  return (
                    <tr key={dt} style={{borderBottom:`1px solid ${s.dim}`,background:isToday?"#0d1a2a":"transparent"}}>
                      <td style={{padding:"7px 10px",color:isToday?s.accent:s.muted,fontSize:11}}>{dt.slice(5)}</td>
                      {DOMAINS.map(d=>{ const p=domainPct(dd.checks?.[d.id],d.habits); return <td key={d.id} style={{padding:"7px 5px",textAlign:"center",fontSize:11,color:pctColor(p)}}>{p>0?p+"%":"·"}</td>; })}
                      <td style={{padding:"7px 8px",textAlign:"center",fontWeight:600,fontSize:12,color:pctColor(dp)}}>{dp>0?dp+"%":"·"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

<script>
const _nodes = {
  financial:{cx:340,cy:297,hw:70,hh:29},mental:{cx:340,cy:60,hw:64,hh:26},
  charisma:{cx:574,cy:170,hw:68,hh:26},seduction:{cx:574,cy:424,hw:68,hh:26},
  nutrition:{cx:340,cy:534,hw:64,hh:26},fitness:{cx:106,cy:424,hw:68,hh:26},
  beauty:{cx:106,cy:170,hw:68,hh:26},
};
const _ring = ['mental','charisma','seduction','nutrition','fitness','beauty'];
const _rc = {mental:'#7F77DD',charisma:'#BA7517',seduction:'#D85A30',nutrition:'#639922',fitness:'#378ADD',beauty:'#D4537E'};

function _edge(from,to){
  const n=_nodes[from],dx=_nodes[to].cx-n.cx,dy=_nodes[to].cy-n.cy;
  const a=Math.atan2(dy,dx),ca=Math.cos(a),sa=Math.sin(a);
  const t=Math.min(Math.abs(ca)<1e-6?Infinity:n.hw/Math.abs(ca),Math.abs(sa)<1e-6?Infinity:n.hh/Math.abs(sa))-6;
  return {x:n.cx+ca*t,y:n.cy+sa*t};
}

function buildFlywheel(){
  const fw=document.getElementById('fw'); if(!fw) return;
  const arcsG=document.getElementById('arcs');
  const spokesG=document.getElementById('spokes');
  if(!arcsG||!spokesG) return;
  arcsG.innerHTML=''; spokesG.innerHTML='';
  const ns='http://www.w3.org/2000/svg';

  for(let i=0;i<_ring.length;i++){
    const from=_ring[i],to=_ring[(i+1)%_ring.length],c=_rc[from];
    const p1=_edge(from,to),p2=_edge(to,from);
    const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
    const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy),curve=len*0.18;
    const nx=-dy/len,ny=dx/len;
    const d=`M${p1.x.toFixed(1)} ${p1.y.toFixed(1)} Q${(mx+nx*curve).toFixed(1)} ${(my+ny*curve).toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',d); path.setAttribute('fill','none');
    path.setAttribute('stroke',c); path.setAttribute('stroke-width','1.5');
    path.setAttribute('stroke-linecap','round'); path.setAttribute('marker-end','url(#ah)');
    path.setAttribute('opacity','0.7'); arcsG.appendChild(path);
  }

  for(const domain of _ring){
    const c=_rc[domain],p1=_edge(domain,'financial'),p2=_edge('financial',domain);
    const path=document.createElementNS(ns,'path');
    path.setAttribute('d',`M${p1.x.toFixed(1)} ${p1.y.toFixed(1)} L${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`);
    path.setAttribute('fill','none'); path.setAttribute('stroke',c);
    path.setAttribute('stroke-width','1'); path.setAttribute('stroke-dasharray','4 4');
    path.setAttribute('stroke-linecap','round'); path.setAttribute('marker-end','url(#ah)');
    path.setAttribute('opacity','0.45'); spokesG.appendChild(path);
  }

  ['n-mental','n-charisma','n-seduction','n-nutrition','n-fitness','n-beauty','n-financial'].forEach(id=>{
    const el=document.getElementById(id); if(el) fw.appendChild(el);
  });
}

const _details = {
  financial:{title:'Financial — the primary engine',body:"Everything feeds here. Job search output, delivery income, and skill-building all convert to capital. As the engine, Financial is the only node that compounds across all others — more resources → better inputs for every other domain."},
  mental:{title:'Mental — strategy & clarity',body:"Your Obsidian system, reading, and weekly reviews live here. Mental clarity sharpens your financial decisions and job search execution. Strong Mental → better Charisma (sharper thinking shows up in conversation)."},
  charisma:{title:'Charisma — social leverage',body:"Your delivery shift is live practice reps every evening. Each customer interaction is a low-stakes charisma workout. Strong Charisma compounds into Seduction and lifts Financial through interviews and negotiation."},
  seduction:{title:'Seduction — presence & draw',body:"The downstream output of Charisma, Fitness, and Beauty converging. This is where the 4-month silent build pays off — you're not chasing, you're becoming someone worth chasing."},
  nutrition:{title:'Nutrition — fuel & body comp',body:"Your protein breakfast flywheel anchors this. Hitting targets here directly enables Fitness output — gym performance and recovery. Body composition changes also compound into Beauty and Seduction."},
  fitness:{title:'Fitness — energy & signal',body:"Gym sessions generate energy that raises your daily output ceiling across every domain. The 10k step walk targets dual output: steps for Fitness, audio content for Mental. Fitness → Beauty → Seduction."},
  beauty:{title:'Beauty — aesthetic edge',body:"Grooming, style, and physical presentation. Easiest domain to move quickly in relative to effort. Strong Beauty amplifies first impressions in every social context — interviews, dates, delivery interactions."},
};

function sel(key){
  const d=_details[key]; if(!d) return;
  const dt=document.getElementById('dt'),db=document.getElementById('db'),panel=document.getElementById('detail-panel');
  if(dt) dt.textContent=d.title;
  if(db) db.textContent=d.body;
  if(panel) panel.style.display='block';
  document.querySelectorAll('.nc').forEach(g=>g.style.opacity='0.4');
  const nk=document.getElementById('n-'+key),nf=document.getElementById('n-financial');
  if(nk) nk.style.opacity='1';
  if(nf) nf.style.opacity='1';
}

// Build flywheel once each time the SVG appears, disconnect while absent
let _built = false;
const _obs = new MutationObserver(()=>{
  const fw = document.getElementById('fw');
  if(!_built && fw){ _built=true; buildFlywheel(); }
  if(_built && !fw){ _built=false; }
});
_obs.observe(document.body, {childList:true, subtree:false});
// Also watch one level deeper without walking entire tree
_obs.observe(document.getElementById('root'), {childList:true});
</script>
