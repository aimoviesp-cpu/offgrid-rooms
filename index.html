<script>
// ── Flywheel (plain JS, no React/JSX) ──────────────────────────────────────
var FW_NODES={financial:{cx:340,cy:297,hw:70,hh:29},mental:{cx:340,cy:60,hw:64,hh:26},charisma:{cx:574,cy:170,hw:68,hh:26},seduction:{cx:574,cy:424,hw:68,hh:26},nutrition:{cx:340,cy:534,hw:64,hh:26},fitness:{cx:106,cy:424,hw:68,hh:26},beauty:{cx:106,cy:170,hw:68,hh:26}};
var FW_RING=['mental','charisma','seduction','nutrition','fitness','beauty'];
var FW_COL={mental:'#7F77DD',charisma:'#BA7517',seduction:'#D85A30',nutrition:'#639922',fitness:'#378ADD',beauty:'#D4537E'};
var FW_DET={
  financial:{t:'Financial — primary engine',b:'Everything feeds here. Job search output, delivery income, and skill-building all convert to capital. Financial is the only node that compounds across all others.'},
  mental:{t:'Mental — strategy & clarity',b:'Your Obsidian system, reading, and weekly reviews live here. Mental clarity sharpens financial decisions and job search execution.'},
  charisma:{t:'Charisma — social leverage',b:'Your delivery shift is live practice reps every evening. Strong Charisma compounds into Seduction and lifts Financial through interviews and negotiation.'},
  seduction:{t:'Seduction — presence & draw',b:'The downstream output of Charisma, Fitness, and Beauty converging. This is where the 4-month silent build pays off.'},
  nutrition:{t:'Nutrition — fuel & body comp',b:'Your protein breakfast flywheel anchors this. Hitting targets here directly enables Fitness output and compounds into Beauty and Seduction.'},
  fitness:{t:'Fitness — energy & signal',b:'Gym sessions raise your daily output ceiling across every domain. The 10k step walk targets dual output: Fitness + Mental audio. Fitness → Beauty → Seduction.'},
  beauty:{t:'Beauty — aesthetic edge',b:'Grooming, style, and physical presentation. Easiest domain to move quickly in relative to effort. Feeds back into Mental via confidence.'}
};

function fwEdge(f,t){
  var n=FW_NODES[f],to=FW_NODES[t];
  var dx=to.cx-n.cx,dy=to.cy-n.cy,a=Math.atan2(dy,dx);
  var ca=Math.cos(a),sa=Math.sin(a);
  var tw=Math.abs(ca)<1e-6?1e9:n.hw/Math.abs(ca);
  var th=Math.abs(sa)<1e-6?1e9:n.hh/Math.abs(sa);
  var t2=Math.min(tw,th)-6;
  return{x:n.cx+ca*t2,y:n.cy+sa*t2};
}

function buildFlywheel(){
  var svg=document.getElementById('fw-svg');
  if(!svg)return;
  var ns='http://www.w3.org/2000/svg';
  // clear old arrows
  ['fw-arcs','fw-spokes'].forEach(function(id){
    var g=document.getElementById(id);
    if(g)g.innerHTML='';
  });
  var ag=document.getElementById('fw-arcs');
  var sg=document.getElementById('fw-spokes');
  if(!ag||!sg)return;

  // ring arcs
  for(var i=0;i<FW_RING.length;i++){
    var f=FW_RING[i],t2=FW_RING[(i+1)%FW_RING.length],c=FW_COL[f];
    var p1=fwEdge(f,t2),p2=fwEdge(t2,f);
    var mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
    var dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy);
    var curve=len*0.18,nx=-dy/len,ny=dx/len;
    var p=document.createElementNS(ns,'path');
    p.setAttribute('d','M'+p1.x.toFixed(1)+' '+p1.y.toFixed(1)+' Q'+(mx+nx*curve).toFixed(1)+' '+(my+ny*curve).toFixed(1)+' '+p2.x.toFixed(1)+' '+p2.y.toFixed(1));
    p.setAttribute('fill','none');p.setAttribute('stroke',c);p.setAttribute('stroke-width','1.5');
    p.setAttribute('stroke-linecap','round');p.setAttribute('marker-end','url(#fw-ah)');p.setAttribute('opacity','0.7');
    ag.appendChild(p);
  }
  // spokes
  FW_RING.forEach(function(d){
    var c=FW_COL[d],p1=fwEdge(d,'financial'),p2=fwEdge('financial',d);
    var p=document.createElementNS(ns,'path');
    p.setAttribute('d','M'+p1.x.toFixed(1)+' '+p1.y.toFixed(1)+' L'+p2.x.toFixed(1)+' '+p2.y.toFixed(1));
    p.setAttribute('fill','none');p.setAttribute('stroke',c);p.setAttribute('stroke-width','1');
    p.setAttribute('stroke-dasharray','4 4');p.setAttribute('stroke-linecap','round');
    p.setAttribute('marker-end','url(#fw-ah)');p.setAttribute('opacity','0.4');
    sg.appendChild(p);
  });
  // re-append nodes on top
  ['fw-mental','fw-charisma','fw-seduction','fw-nutrition','fw-fitness','fw-beauty','fw-financial'].forEach(function(id){
    var el=document.getElementById(id);if(el)svg.appendChild(el);
  });
}

function fwSel(key){
  var d=FW_DET[key];if(!d)return;
  var panel=document.getElementById('detail-panel');
  var dt=document.getElementById('detail-title');
  var db=document.getElementById('detail-body');
  if(dt)dt.textContent=d.t;
  if(db)db.textContent=d.b;
  if(panel)panel.style.display='block';
  document.querySelectorAll('.nc').forEach(function(g){g.style.opacity='0.35';});
  var nk=document.getElementById('fw-'+key);
  var nf=document.getElementById('fw-financial');
  if(nk)nk.style.opacity='1';
  if(nf)nf.style.opacity='1';
}

var _fwBuilt=false;
var _fwObs=new MutationObserver(function(){
  var svg=document.getElementById('fw-svg');
  if(!_fwBuilt&&svg){_fwBuilt=true;buildFlywheel();}
  if(_fwBuilt&&!svg){_fwBuilt=false;}
});
</script>

                <div style={{fontSize:12,color:S.muted,marginBottom:14,lineHeight:1.6}}>Export saves all your data to a JSON file. Import restores from a previously exported file. Do this weekly to avoid data loss on Safari.</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <button onClick={exportD} style={{background:"transparent",border:`1px solid ${S.accent}`,borderRadius:8,padding:"12px 16px",color:S.accent,fontSize:14,fontWeight:500,cursor:"pointer",textAlign:"left"}}>
                    ⬇ Export backup
                    <div style={{fontSize:11,color:S.muted,marginTop:3,fontWeight:400}}>Download all data as a JSON file</div>
                  </button>
                  <label style={{background:"transparent",border:`1px solid ${S.border}`,borderRadius:8,padding:"12px 16px",color:S.muted,fontSize:14,fontWeight:500,cursor:"pointer",display:"block"}}>
                    ⬆ Import backup
                    <div style={{fontSize:11,color:S.muted,marginTop:3,fontWeight:400}}>Restore from a previously exported file</div>
                    <input type="file" accept=".json" onChange={importD} style={{display:"none"}}/>
                  </label>
                </div>
              </div>
            </div>
            <div style={{...C(),overflow:"hidden",marginBottom:14}}>
              <div style={{padding:"10px 14px",fontSize:13,fontWeight:500,borderBottom:`1px solid ${S.border}`}}>About</div>
              <div style={{padding:14}}>
                {[["Profile","Male · 25y · 200lb · 5'10\""],["Base burn",BASE+" kcal/day"],["Step burn","~0.045 kcal per step"],["Scoring","Weighted % per domain, avg 8 domains"]].map(([l,v])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${S.dim}`}}>
                    <span style={{fontSize:13,color:S.muted}}>{l}</span>
                    <span style={{fontSize:13,color:S.text}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{...C(),overflow:"hidden"}}>
              <div style={{padding:"10px 14px",fontSize:13,fontWeight:500,borderBottom:`1px solid ${S.border}`}}>Danger Zone</div>
              <div style={{padding:14}}>
                <div style={{fontSize:12,color:S.muted,marginBottom:12,lineHeight:1.6}}>Permanently deletes all logged data. Export first.</div>
                <button onClick={()=>{if(window.confirm("Delete ALL data? Cannot be undone.")){upd({});alert("Cleared.");}}}
                  style={{background:"transparent",border:`1px solid #f87171`,borderRadius:8,padding:"10px 16px",color:"#f87171",fontSize:13,fontWeight:500,cursor:"pointer",width:"100%"}}>
                  Clear all data
                </button>
              </div>
            </div>
          </div>
        )}

      </div>

      <div style={{background:S.card,borderTop:`1px solid ${S.border}`,padding:"10px 16px",position:"sticky",bottom:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{fontSize:11,color:S.muted}}>{today}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span>⚡</span><span style={{fontSize:13,fontWeight:500}}>{str}d streak</span></div>
          <div style={{fontSize:13,color:pc(tPct),fontWeight:600}}>{tPct}%</div>
        </div>
        <div style={{height:3,background:S.border,borderRadius:2}}>
          <div style={{height:"100%",width:`${tPct}%`,background:pc(tPct),borderRadius:2,transition:"width 0.3s"}}/>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
// expose flywheel functions globally so React component and inline SVG handlers can reach them
window.buildFlywheel = buildFlywheel;
window.fwSel = fwSel;
window._fwObs = _fwObs;
window._fwBuilt = _fwBuilt;
_fwObs.observe(document.getElementById('root'), {childList:true});
</script>

</body>
</html>
